<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ThinkEd</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Login ke ThinkEd</h2>
    <form id="login-form">
      <input type="text" placeholder="Username" class="w-full p-3 border rounded mb-4" required>
      <input type="password" placeholder="Password" class="w-full p-3 border rounded mb-4" required>
      <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded hover:bg-indigo-700">Login</button>
    </form>
    <p class="text-center text-sm mt-4">Belum punya akun? <a href="signup.html" class="text-indigo-600 underline">Daftar</a></p>
  </div>
</body>
</html>
